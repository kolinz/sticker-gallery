# /etc/nginx/sites-available/sticker-gallery
#
# セットアップ手順:
#   sudo cp nginx.conf /etc/nginx/sites-available/sticker-gallery
#   sudo ln -s /etc/nginx/sites-available/sticker-gallery /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name gallery.example.com;   # ← 実際のドメインに変更すること
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name gallery.example.com;   # ← 実際のドメインに変更すること

    # SSL 証明書（Let's Encrypt）
    # sudo certbot --nginx -d gallery.example.com で自動設定される
    ssl_certificate     /etc/letsencrypt/live/gallery.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gallery.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 画像アップロード上限（multer の 5MB + マージン）
    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
